<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Resource</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f9;
            text-align: center;
        }

        header {
            background-color: #007BFF;
            color: white;
            padding: 15px;
        }

        .container {
            margin-top: 40px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .back {
            margin-top: 20px;
            display: block;
        }
    </style>
</head>

<body>

<header>
    <h1>Upload Resource</h1>
</header>

<div class="container">

    <input type="text" id="name" placeholder="Resource Name"><br>
    <input type="text" id="subject" placeholder="Subject"><br>

    <button onclick="saveResource()">Save Resource</button>

    <button class="back" onclick="window.location.href='dashboard.html'">
        Back to Dashboard
    </button>

</div>

<script>
function saveResource() {
    var name = document.getElementById("name").value;
    var subject = document.getElementById("subject").value;

    if (name === "" || subject === "") {
        alert("Please fill all fields");
        return;
    }

    var resources = JSON.parse(localStorage.getItem("resources")) || [];

    resources.push({name: name, subject: subject});

    localStorage.setItem("resources", JSON.stringify(resources));

    alert("Resource saved successfully");

    document.getElementById("name").value = "";
    document.getElementById("subject").value = "";
}
</script>

</body>
</html>
