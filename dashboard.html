<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("Background.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            color: white;
            background-color: rgba(0, 123, 255, 0.8);
            padding: 20px;
            margin: 0;
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        .button-container {
            display: flex;
            flex-direction: row;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 220px;
        }

        .card img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            width: 180px;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .logout-btn {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h1>CLASSROOM RESOURCE MANAGEMENT SYSTEM</h1>

<div class="dashboard">

    <div class="button-container">

        <div class="card">
            <img src="upload.png" alt="Upload">
            <br>
            <button onclick="window.location.href='File_upload.html'">
                Upload Resources
            </button>
        </div>

        <div class="card">
            <img src="view.png" alt="View">
            <br>
            <button onclick="window.location.href='catalog.html'">
                View Resources
            </button>
        </div>

        <div class="card">
            <img src="dashboard.png" alt="Manage">
            <br>
            <button onclick="window.location.href='manage.html'">
                Manage Resources
            </button>
        </div>

    </div>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>

</div>

<script>
function logout() {
    localStorage.removeItem("loggedIn");
    window.location.href = "index.html";
}

if (!localStorage.getItem("loggedIn")) {
    window.location.href = "index.html";
}
</script>

</body>
</html>
