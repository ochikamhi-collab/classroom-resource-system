<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Resource</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
        }
        h1 {
            background-color: #007BFF;
            color: white;
            padding: 20px;
        }
        .container {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        input[type="text"], input[type="file"] {
            padding: 10px;
            margin: 10px;
            width: 300px;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin: 20px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Upload Resource</h1>
    <div class="container">
        <form id="uploadForm" action="http://localhost:3000/upload" method="POST" enctype="multipart/form-data">
            <input type="text" name="name" placeholder="Resource Name" required><br>
            <input type="text" name="subject" placeholder="Subject" required><br>
            <input type="file" name="file" required><br>
            <button type="submit">Upload Resource</button>
        </form>
    </div>
    <script>
        // Optional: You can add JavaScript validation here if needed.
    </script>
</body>
</html>
